name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --check

  verify:
    name: Verify (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, macos-13, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Verify Cargo.lock is up to date
        run: cargo check --locked

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test

  target-checks:
    name: Target Check (aarch64-unknown-linux-gnu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install Linux ARM cross linker
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Check target build
        env:
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
        run: cargo check --locked --target aarch64-unknown-linux-gnu

  package:
    name: Package Check
    runs-on: ubuntu-latest
    needs: [format, verify, target-checks]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Verify publishable package
        run: cargo publish --dry-run --locked

      - name: List packaged files
        run: cargo package --list

  all-checks-passed:
    name: All checks passed
    runs-on: ubuntu-latest
    needs: [format, verify, target-checks, package]
    if: always()
    steps:
      - name: Verify all checks passed
        run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "Some checks failed or were cancelled"
            exit 1
          fi
          echo "All checks passed"
